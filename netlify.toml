# Netlify config for the static Interview Prep app.

[build]
  publish = "."

# Keep the service worker and manifest from being cached long, so PWA updates
# ship on the next visit after a deploy.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=0, must-revalidate"
